{% extends "base.html" %}

{% block content %}
    <!-- Removed stray inline CSS and style tag -->
<div class="auth-page">
    <div class="auth-box">
        <div class="auth-logo">
            <span>✦ Innova Learning</span>
        </div>
        <h2 class="titulo-auth">Iniciar sesión</h2>

        {% if error %}
            <div style="background: #fecaca; color: #b91c1c; padding: 12px; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500; margin-bottom: 20px; border: 1.5px solid #fca5a5; text-align: center;">
                {{ error }}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Usuario / Correo electrónico</label>
                <input type="text" name="username" placeholder="Ej: juan_perez o tu@correo.com" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="btn-primary-form">Ingresar</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 0.9rem;">
            <a href="/registro/" style="color: var(--primary); font-weight: 600; transition: var(--transition);" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">¿No tienes cuenta? Regístrate aquí</a>
        </div>
        <div style="margin-top: 12px; text-align: center; font-size: 0.9rem;">
            <a href="/" style="color: var(--text-sub); font-weight: 500; transition: var(--transition);" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">← Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
