{% extends "base.html" %}

{% block content %}

<div class="auth-page">
    <div class="auth-box">

        <div class="auth-logo">
            <span>✦ Innova Learning</span>
        </div>

        <h2 class="titulo-auth">Iniciar sesión</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}

            <div class="form-group">
                <label>Usuario / Correo electrónico</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary-form">
                Ingresar
            </button>
        </form>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/registro/">¿No tienes cuenta? Regístrate</a>
        </div>

        <div style="margin-top: 10px; text-align: center;">
            <a href="/">← Volver al inicio</a>
        </div>

    </div>
</div>

{% endblock %}
