{% extends "base.html" %}

{% block content %}
<style>
.container {
    max-width: 500px;
    margin: 80px auto;
    background: white;
    padding: 35px;
    border-radius: 12px;
    box-shadow: 0 4px 25px rgba(0,0,0,0.08);
    text-align: center;
}

h2 {
    color: #dc3545;
    margin-bottom: 15px;
}

p {
    color: #555;
    margin-bottom: 25px;
    font-size: 1rem;
}

.curso-nombre {
    font-weight: bold;
    color: #2c3e50;
}

.botones {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.95rem;
}

.btn-eliminar {
    background: #dc3545;
    color: white;
}

.btn-eliminar:hover {
    background: #b02a37;
}

.btn-cancelar {
    background: #6c757d;
    color: white;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-cancelar:hover {
    background: #545b62;
}
</style>

<div class="container">

    <h2>⚠ Eliminar Curso</h2>

    <p>
        ¿Estás seguro que deseas eliminar el curso:<br>
        <span class="curso-nombre">"{{ curso.nombre }}"</span>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="botones">
            <button type="submit" class="btn btn-eliminar">
                Sí, eliminar
            </button>

            <a href="{% url 'admin_cursos' %}" class="btn btn-cancelar">
                Cancelar
            </a>
        </div>
    </form>

</div>

{% endblock %}
