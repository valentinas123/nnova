{% extends "base.html" %}

{% block content %}
<style>
.container {
    max-width: 600px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #2c3e50;
}

.form-group {
    margin-bottom: 20px;
}

label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
}

input, textarea, select {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.btn {
    width: 100%;
    padding: 14px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
}

.btn:hover {
    background: #0056b3;
}
</style>

<div class="container">
    <h2>Crear Curso (Admin)</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Nombre del curso</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group">
            <label>Docente</label>
            <select name="docente" required>
                <option value="">Seleccionar docente</option>
                {% for d in docentes %}
                    <option value="{{ d.id }}">{{ d.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Imagen (opcional)</label>
            <input type="file" name="imagen">
        </div>

        <div class="form-group">
            <label>Documento/Material del curso (Opcional)</label>
            <input type="file" name="archivo" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx">
        </div>

        <button type="submit" class="btn">Crear Curso</button>
    </form>
</div>

{% endblock %}
