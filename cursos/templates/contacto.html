{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: auto; padding: 20px;">
    <h2>Contacto</h2>
    
    <!-- 🚀 Volvemos a la etiqueta dinámica oficial de Django -->
    <form method="post" action="{% url 'contacto' %}">
        {% csrf_token %}
        
        <textarea name="mensaje" placeholder="Escribe tu mensaje..." style="width: 100%; height: 150px; padding: 10px; box-sizing: border-box;" required></textarea>
        
        <button type="submit" style="margin-top: 10px; padding: 10px 20px; cursor: pointer;">
            Enviar mensaje
        </button>
    </form>
</div>
{% endblock %}
