{% extends "base.html" %}

{% block content %}
<div style="max-width:500px; margin:auto;">

    <h2>Contacto</h2>

    <form method="post">
        {% csrf_token %}

        <textarea name="mensaje" placeholder="Escribe tu mensaje..." 
        style="width:100%; height:150px; padding:10px;"></textarea>

        <button type="submit" style="margin-top:10px;">
            Enviar mensaje
        </button>
    </form>

</div>
{% endblock %}
