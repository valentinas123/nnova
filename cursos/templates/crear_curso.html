{% extends "base.html" %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto 120px auto; /* Espacio abajo */
        padding: 30px;
        background: white;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .titulo { font-size: 1.8rem; color: #2c3e50; margin: 0; }

    .btn-volver {
        text-decoration: none;
        padding: 8px 16px;
        background: #6c757d;
        color: white;
        border-radius: 6px;
        font-size: 0.9rem;
    }

    /* Estilos de Formulario */
    .form-group { margin-bottom: 20px; }
    
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }

    input, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box; /* Evita que el input se salga del borde */
        font-family: inherit;
    }

    textarea { height: 120px; resize: vertical; }

    input[type="file"] { padding: 10px 0; }

    .btn-submit {
        width: 100%;
        padding: 14px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-submit:hover { background: #0056b3; }
</style>

<div class="form-container">
    <div class="header-flex">
        <h2 class="titulo">Crear Curso</h2>
        <a href="{% url 'panel_docente' %}" class="btn-volver">Volver</a>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Nombre del curso</label>
            <input type="text" name="nombre" placeholder="Ej: Inglés Avanzado" required>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea name="descripcion" placeholder="Describe los objetivos del curso..." required></textarea>
        </div>

        <div class="form-group">
            <label>Imagen del curso</label>
            <input type="file" name="imagen">
        </div>

        <div class="form-group">
            <label>Documento/Material del curso (Opcional)</label>
            <input type="file" name="archivo" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx">
        </div>

        <button type="submit" class="btn-submit">Crear curso</button>
    </form>
</div>
{% endblock %}
