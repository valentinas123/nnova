{% extends "base.html" %}

{% block content %}
<div class="contenedor" style="max-width: 600px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;">
    <h2>Crear Actividad</h2>
    <p style="color: #64748b;"><strong>Curso:</strong> {{ curso.nombre }}</p>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Título de la Actividad</label>
            <input type="text" name="titulo" placeholder="Ej: Tarea 1: Introducción a Django" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Instrucciones / Descripción</label>
            <textarea name="descripcion" placeholder="Describe los requisitos y entregables de la tarea..." required style="width: 100%; height: 150px; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; font-family: inherit;"></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Fecha y Hora Límite</label>
            <input type="datetime-local" name="fecha_limite" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #475569;">Documento/Archivo Adjunto (Opcional)</label>
            <input type="file" name="archivo" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; box-sizing: border-box;">
        </div>

        <button type="submit" class="btn-grande" style="width: 100%; background: #2563eb; color: white; border-radius: 8px; padding: 14px; border: none; cursor: pointer; font-weight: 600;">Crear Actividad</button>
    </form>
    
    <br>
    <a href="{% url 'detalle_curso' curso.id %}" style="text-decoration: none; display: block; text-align: center; color: #64748b; font-weight: 500; margin-top: 10px;">Volver al curso</a>
</div>
{% endblock %}
